name: Frontend E2E

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend-e2e:
    name: frontend-e2e
    runs-on: ubuntu-latest
    env:
      TRANXIT_BACKEND_DIR: ${{ github.workspace }}/TranXIT-Backend/TranXit
      TRANXIT_E2E_FRONTEND_PORT: "3100"
      TRANXIT_E2E_GATEWAY_PORT: "18188"
      TRANXIT_E2E_SQL_PORT: "11488"
      TRANXIT_E2E_RABBITMQ_PORT: "25688"
      TRANXIT_E2E_RABBITMQ_MANAGEMENT_PORT: "25689"
      TRANXIT_E2E_PROJECT_NAME: tranxit-e2e-ci
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3100
      NEXT_PUBLIC_TRANXIT_API_URL: http://127.0.0.1:18188
      TRANXIT_API_URL: http://127.0.0.1:18188
      TRANXIT_E2E_EXPOSE_DEV_CODE: "true"
    steps:
      - name: Checkout frontend
        uses: actions/checkout@v4

      - name: Resolve backend ref
        id: backend-ref
        run: |
          backend_repo="https://github.com/makewaysdotnet/TranXIT-Backend.git"
          fallback="feature/web-first-mvp"
          fixture_path="TranXit/docker-compose.test.yml"
          candidate="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          has_backend_fixture() {
            ref="$1"
            tmp_dir="$(mktemp -d)"
            git -C "$tmp_dir" init -q
            git -C "$tmp_dir" remote add origin "$backend_repo"
            if ! git -C "$tmp_dir" fetch --depth=1 origin "$ref" >/dev/null 2>&1; then
              rm -rf "$tmp_dir"
              return 1
            fi
            git -C "$tmp_dir" cat-file -e "FETCH_HEAD:$fixture_path" >/dev/null 2>&1
            found=$?
            rm -rf "$tmp_dir"
            return "$found"
          }

          if git ls-remote --exit-code --heads "$backend_repo" "$candidate" >/dev/null; then
            selected="$candidate"
          else
            echo "::notice::Backend branch $candidate was not found; falling back to $fallback"
            selected="$fallback"
          fi

          if ! has_backend_fixture "$selected"; then
            if [ "$selected" != "$fallback" ]; then
              echo "::error::Backend $selected is missing $fixture_path; falling back to $fallback"
              selected="$fallback"
            fi

            if ! has_backend_fixture "$selected"; then
              echo "::error::Backend fallback $selected is missing $fixture_path"
              exit 1
            fi
          fi

          echo "ref=$selected" >> "$GITHUB_OUTPUT"

      - name: Checkout backend test stack
        uses: actions/checkout@v4
        with:
          repository: makewaysdotnet/TranXIT-Backend
          ref: ${{ steps.backend-ref.outputs.ref }}
          path: TranXIT-Backend

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Verify Docker
        run: docker info

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Start backend test stack
        run: |
          set +e
          npm run e2e:stack:up
          status=$?
          set -e

          if [ "$status" -eq 13 ]; then
            echo "::warning::Backend stack startup exited 13 after Compose startup; validating gateway readiness before failing."
            ready=false
            for attempt in $(seq 1 90); do
              if curl -fsS "$TRANXIT_API_URL/api/roles" >/dev/null; then
                echo "TranXIT E2E gateway is ready at $TRANXIT_API_URL"
                ready=true
                break
              fi
              echo "Waiting for TranXIT E2E gateway at $TRANXIT_API_URL ($attempt/90)"
              sleep 2
            done

            if [ "$ready" != "true" ]; then
              npm run e2e:stack:logs || true
              exit 1
            fi
          elif [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: Lint
        run: npm run lint

      - name: Build frontend for E2E
        run: npm run build:e2e

      - name: Run Playwright E2E
        run: npm run e2e:test

      - name: Backend stack diagnostics
        if: failure()
        run: |
          npm run e2e:stack:logs 2>&1 | tee e2e-stack-diagnostics.log || true
          echo "::group::docker version"
          { docker version || true; docker compose version || true; } 2>&1 | tee e2e-docker-version.log || true
          echo "::endgroup::"

      - name: Stop backend test stack
        if: always()
        run: npm run e2e:stack:down

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
            *.log
            ${{ env.TRANXIT_BACKEND_DIR }}/*.log
          if-no-files-found: ignore
